name: Track Website Changes

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  schedule:
    # Runs automatically every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run the workflow manually from the Actions tab

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf

      - name: Run scraping script
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Stage the data folder
          git add data/
          
          # Check if there are any changes to commit. If yes, commit and push.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Website content changed" && git push)
